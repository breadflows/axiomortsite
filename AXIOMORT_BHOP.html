<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AXIOMORT®</title>
<style>
  :root { --cyan:#aebfe8; --magenta:#d4af37; --lime:#7CFFB2; --amber:#d4af37; --bone:#e8e4dc; --void:#05070f; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000;
    color: #cfd7e6; font-family: "Bahnschrift", "Trebuchet MS", sans-serif;
    font-stretch: condensed; letter-spacing: 1px; user-select: none; }
  #c { position: fixed; inset: 0; display: block; }
  #ui { position: fixed; inset: 0; pointer-events: none; z-index: 5; }

  #crosshair { position: absolute; left: 50%; top: 50%;
    width: 4px; height: 4px; border-radius: 50%; background: #fff;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 8px #fff, 0 0 14px var(--cyan); }
  #speed { position: absolute; left: 50%; bottom: 90px; transform: translateX(-50%);
    font-size: 56px; font-weight: 700; letter-spacing: 6px; color: #fff;
    text-shadow: -1.5px 0 var(--magenta), 1.5px 0 var(--cyan),
                 0 0 12px var(--cyan), 0 0 28px rgba(0,240,255,0.4);
    line-height: 1; }
  #speedUnit { font-size: 14px; opacity: 0.55; letter-spacing: 4px; margin-left: 4px; }

  #info { position: absolute; left: 18px; top: 16px;
    font-size: 13px; letter-spacing: .5px; opacity: 0.85; line-height: 1.9; font-weight:600; }
  #info b { color: var(--lime); font-weight: 700; text-shadow: 0 0 6px rgba(182,255,60,0.5); }

  #status { position: absolute; right: 18px; top: 16px;
    font-size: 13px; letter-spacing: .5px; opacity: 0.9; font-weight:600;
    text-align: right; line-height: 1.9; color: var(--cyan); }
  #status b { color: #fff; text-shadow: 0 0 6px var(--cyan); }

  #levelBanner { position: absolute; left: 50%; top: 38%;
    transform: translateX(-50%); text-align: center; opacity: 0;
    transition: opacity .35s; pointer-events: none; }
  #levelBanner .num { font-size: 11px; letter-spacing: 6px; opacity: 0.7; color: var(--cyan); }
  #levelBanner .name { font-size: 42px; letter-spacing: 8px; font-weight: 700; color: #fff;
    text-shadow: -1.5px 0 var(--magenta), 1.5px 0 var(--cyan), 0 0 18px var(--cyan);
    margin: 8px 0 4px; }
  #levelBanner .track { font-size: 11px; letter-spacing: 4px; opacity: 0.55; color: var(--lime);
    text-transform: uppercase; }

  #fade { position: fixed; inset: 0; background: #000; opacity: 0; pointer-events: none;
    z-index: 18; transition: opacity .45s; }

  #pause { position: fixed; inset: 0; display: none; place-items: center;
    background: rgba(5,7,15,.92); backdrop-filter: blur(8px);
    color: #fff; z-index: 20; pointer-events: auto; }
  #pause.show { display: grid; }
  #pauseBox { width: 480px; max-width: 90vw;
    border: 1px solid rgba(232,228,220,.22); border-radius: 8px; padding: 30px 32px;
    background: linear-gradient(180deg,rgba(10,12,18,.58),rgba(10,12,18,.42));
    box-shadow: 0 18px 54px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.08);
    backdrop-filter: blur(10px);
  }
  #pauseBox h1 { font-size: 32px; letter-spacing: 4px; margin: 0 0 6px; font-weight: 700;
    color: #fff; text-shadow: 0 0 24px rgba(212,175,55,.22); text-align: center; }
  #pauseBox .sub { font-size: 11px; letter-spacing: 5px; text-align: center;
    opacity: 0.74; color: #b6c0d8; margin-bottom: 22px; }
  .row { display: flex; align-items: center; justify-content: space-between;
    margin: 12px 0; font-size: 11px; letter-spacing: 2px; }
  .row label { color: #aab8d0; text-transform: uppercase; }
  .row .val { color: var(--bone); min-width: 50px; text-align: right; }
  input[type=range] { -webkit-appearance: none; appearance: none;
    background: linear-gradient(to right, rgba(232,228,220,.28), var(--amber));
    height: 4px; width: 220px; border-radius: 2px; outline: none;
    box-shadow: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none;
    width: 14px; height: 14px; border-radius: 50%; background: #fff;
    box-shadow: 0 0 8px rgba(212,175,55,.35); cursor: pointer; }
  input[type=range]::-moz-range-thumb { width: 14px; height: 14px; border: 0;
    border-radius: 50%; background: #fff; box-shadow: 0 0 8px rgba(212,175,55,.35); cursor: pointer; }
  .toggle { width: 44px; height: 22px; border-radius: 12px;
    background: rgba(232,228,220,.1); border: 1px solid rgba(232,228,220,.22);
    position: relative; cursor: pointer; transition: background .2s; }
  .toggle.on { background: rgba(212,175,55,.28); }
  .toggle .dot { position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%; background: #fff;
    box-shadow: 0 0 6px rgba(212,175,55,.35); transition: left .2s; }
  .toggle.on .dot { left: 24px; }
  .btnRow { display: flex; gap: 10px; margin-top: 22px; }
  .pbtn { flex: 1; padding: 12px 14px; border: 1.5px solid rgba(232,228,220,.25); border-radius: 30px;
    background: transparent;
    color: #fff; font-family: inherit; font-size: 11px; letter-spacing: 3px;
    cursor: pointer; transition: background .15s, box-shadow .15s; text-transform: uppercase; }
  .pbtn:hover { background: rgba(232,228,220,.12); box-shadow: none; }

  #start { position: fixed; inset: 0; display: none; place-items: center;
    background: radial-gradient(ellipse at center, rgba(4,6,12,0.25), rgba(0,0,0,0.7));
    color: #fff; text-align: center; cursor: pointer; z-index: 22;
    font-family: "Bahnschrift","Trebuchet MS",sans-serif; }
  #start #startTag { font-size: 13px; letter-spacing: 4px; font-weight: 700; color: var(--amber);
    text-transform: uppercase; margin-bottom: 14px; text-shadow: 0 0 12px rgba(255,211,74,.4); }
  #start h1 { font-size: clamp(38px,7vw,64px); letter-spacing: 5px; margin: 0; font-weight: 700; color: #fff;
    text-shadow: 0 0 34px rgba(255,211,74,.35), 0 2px 12px rgba(0,0,0,.6); }
  #start .play-cta { margin-top: 28px; display: inline-flex; align-items: center; gap: 12px;
    padding: 15px 42px; border-radius: 40px; font-size: 15px; letter-spacing: 3px; font-weight: 700;
    color: #0a0a0a; background: linear-gradient(135deg,#ffe79a,var(--amber));
    box-shadow: 0 12px 36px rgba(255,211,74,.4); animation: pulsecta 2s ease-in-out infinite; }
  @keyframes pulsecta { 0%,100%{ transform: scale(1) } 50%{ transform: scale(1.04) } }
  @keyframes blink { 0%,100%{opacity:0.85} 50%{opacity:0.3} }

  #crt { position: fixed; inset: 0; pointer-events: none; z-index: 15; mix-blend-mode: overlay;
    background:
      repeating-linear-gradient(to bottom, rgba(255,255,255,0.04) 0 1px, transparent 1px 3px),
      radial-gradient(ellipse at center, transparent 64%, rgba(0,0,0,0.34) 100%); }
</style>

// ========== PROCEDURAL NEBULA SKYBOX ==========
const skyVertexShader = `
  varying vec3 vLocalPosition;
  void main() {
    vLocalPosition = position;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const skyFragmentShader = `
  uniform vec3 uBgColor;
  uniform vec3 uPriColor;
  uniform vec3 uAccColor;
  uniform float uTime;
  uniform float uSeed;
  varying vec3 vLocalPosition;

  float hash(vec2 p) {
    p = fract(sin(p * vec2(127.1, 311.7)) * 43758.5453);
    return p.x;
  }

  float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f);
    return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
               mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
  }

  float fbm(vec2 p) {
    float v = 0.0;
    float a = 0.5;
    vec2 shift = vec2(100.0);
    mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
    for (int i = 0; i < 4; ++i) {
      v += a * noise(p);
      p = rot * p * 2.0 + shift;
      a *= 0.5;
    }
    return v;
  }

  void main() {
    vec3 dir = normalize(vLocalPosition);
    
    // Horizon gradient
    float horizon = smoothstep(-0.25, 0.35, dir.y);
    vec3 baseColor = mix(uBgColor * 0.38, uBgColor, horizon);
    
    // Volumetric nebula mapping using FBM
    vec2 uv = vec2(atan(dir.x, dir.z), acos(dir.y));
    vec2 motion = vec2(uTime * 0.012 + uSeed * 1.5, uTime * 0.006 + uSeed * 0.8);
    float n = fbm(uv * 3.2 + motion);
    float n2 = fbm(uv * 6.5 - motion * 0.4);
    
    vec3 cloudColor = mix(uPriColor, uAccColor, n2);
    float cloudAlpha = smoothstep(0.38, 0.78, n) * 0.44;
    
    vec3 finalColor = mix(baseColor, cloudColor, cloudAlpha);
    
    // Twinkling stars
    vec2 starUV = uv * 85.0;
    vec2 starGrid = floor(starUV);
    float starHash = hash(starGrid);
    if (starHash > 0.982) {
      float twinkle = 0.4 + 0.6 * sin(uTime * 2.8 + starHash * 12.0);
      vec2 localUV = fract(starUV) - 0.5;
      float dist = length(localUV);
      float starGlow = smoothstep(0.09, 0.0, dist);
      finalColor += vec3(twinkle * starGlow * 0.9);
    }
    
    // High-quality Sun
    vec3 sunDir = normalize(vec3(-1600.0, 2600.0, 1200.0));
    float sunDot = max(0.0, dot(dir, sunDir));
    float sunCore = pow(sunDot, 1500.0);
    float sunGlow = pow(sunDot, 180.0) * 0.8;
    float sunHalo = pow(sunDot, 15.0) * 0.4;
    float flareNoise = noise(uv * 10.0 - vec2(uTime * 0.05));
    float sunFlares = pow(sunDot, 45.0) * flareNoise * 0.25;
    
    vec3 sunColor = vec3(1.0, 1.0, 0.95) * sunCore + 
                    vec3(1.0, 0.82, 0.45) * sunGlow + 
                    vec3(1.0, 0.55, 0.25) * sunHalo +
                    uAccColor * sunFlares;
    
    finalColor += sunColor * 1.5;
    
    gl_FragColor = vec4(finalColor, 1.0);
  }
`;

let audioCtx = null;

function ensureAudioGraph(){
  if (audioGraphReady) return;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    audioCtx = new Ctx();
    videoSrcNode = audioCtx.createMediaElementSource(videoEl);
    videoPanner = audioCtx.createPanner();
    videoPanner.panningModel = 'HRTF';
    videoPanner.distanceModel = 'inverse';
    videoPanner.refDistance = 600;
    videoPanner.maxDistance = 8000;
    videoPanner.rolloffFactor = 0.9;
    videoPanner.coneInnerAngle = 360;
    videoGain = audioCtx.createGain();
    videoGain.gain.value = opt.master;
    videoSrcNode.connect(videoPanner);
    videoPanner.connect(videoGain);
    videoGain.connect(audioCtx.destination);
    videoEl.muted = false;
    videoEl.volume = 1;
    audioGraphReady = true;
  } catch(e){ console.warn('audio graph failed', e); }
}

function applyAudioSettings(){
  if (audioGraphReady && videoGain){
    videoGain.gain.value = opt.master;
  } else {
    videoEl.volume = opt.master;
  }
  playBillboardVideo();
}

function updateListenerPos(){
  if (!audioCtx || !audioCtx.listener) return;
  const L = audioCtx.listener;
  const eyeX = player.pos.x;
  const eyeY = player.pos.y + player.eyeOffset;
  const eyeZ = player.pos.z;
  if (L.positionX) {
    L.positionX.setValueAtTime(eyeX, audioCtx.currentTime);
    L.positionY.setValueAtTime(eyeY, audioCtx.currentTime);
    L.positionZ.setValueAtTime(eyeZ, audioCtx.currentTime);
    const cy = Math.cos(player.yaw), sy = Math.sin(player.yaw);
    const cp = Math.cos(player.pitch), sp = Math.sin(player.pitch);
    L.forwardX.setValueAtTime(-sy*cp, audioCtx.currentTime);
    L.forwardY.setValueAtTime(sp,    audioCtx.currentTime);
    L.forwardZ.setValueAtTime(-cy*cp,audioCtx.currentTime);
    L.upX.setValueAtTime(0, audioCtx.currentTime);
    L.upY.setValueAtTime(1, audioCtx.currentTime);
    L.upZ.setValueAtTime(0, audioCtx.currentTime);
  } else {
    L.setPosition(eyeX, eyeY, eyeZ);
  }
}

function updatePannerPos(worldPos){
  if (!videoPanner || !worldPos) return;
  if (videoPanner.positionX) {
    videoPanner.positionX.setValueAtTime(worldPos.x, audioCtx.currentTime);
    videoPanner.positionY.setValueAtTime(worldPos.y, audioCtx.currentTime);
    videoPanner.positionZ.setValueAtTime(worldPos.z, audioCtx.currentTime);
  } else {
    videoPanner.setPosition(worldPos.x, worldPos.y, worldPos.z);
  }
}

const boxes = [];
const dynamicMeshes = [];  // meshes to remove on level change
const npcGroups = [];
window.npcGroups = npcGroups;

function addBox(x, y, z, w, h, d, color, opts){
  opts = opts || {};
  const geo = new THREE.BoxGeometry(w, h, d);
  const isMirrorWall = opts && (opts.mirrorSide === 'left_wall' || opts.mirrorSide === 'right_wall');
  const mat = new THREE.MeshStandardMaterial({
    color: color !== undefined ? color : 0x4a5470,
    roughness: isMirrorWall ? 0.08 : (opts.roughness !== undefined ? opts.roughness : 0.85),
    metalness: isMirrorWall ? 0.95 : (opts.metalness !== undefined ? opts.metalness : 0.05),
    emissive: opts.emissive || 0x000000,
    emissiveIntensity: opts.emissiveIntensity || 0
  });
  
  if (window.AXEngine && window.AXEngine.ProceduralFactory && !isMirrorWall) {
      window.AXEngine.ProceduralFactory.injectPremiumMaterial(mat, {
          color: opts.emissive ? opts.emissive : (color !== undefined ? color : 0x00ffcc),
          scale: 0.5
      });
  }
  
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  dynamicMeshes.push(mesh);
  boxes.push({
    min: new THREE.Vector3(x - w/2, y - h/2, z - d/2),
    max: new THREE.Vector3(x + w/2, y + h/2, z + d/2),
    mesh: mesh
  });
  if (opts && opts.isPlatform) {
    levelPath.push(new THREE.Vector3(x, y + h/2, z));
  }

  return mesh;
}

function clearLevel(){
  for (let i = npcGroups.length - 1; i >= 0; i--){
    scene.remove(npcGroups[i]);
  }
  npcGroups.length = 0;
  levelPath = []; // Clear platform path tracking
  for (let i = dynamicMeshes.length - 1; i >= 0; i--){
    const m = dynamicMeshes[i];
    scene.remove(m);
    if (m.geometry) m.geometry.dispose();
    if (m.material) m.material.dispose();
  }
  dynamicMeshes.length = 0;
  boxes.length = 0;
  if (goalGroup){
    goalGroup.traverse(function(o){
      if (o.geometry) o.geometry.dispose();
      if (o.material) o.material.dispose();
    });
    scene.remove(goalGroup);
    goalMesh = null;
    goalGroup = null;
  }
  // Video is now a WebGL texture — just pause and reset it
  safeVideoPause();
  billboardVideoReady = false;
  usingLocalVideo = false;
}

function rand(seed){
  // simple seeded random
  let s = seed | 0;
  return function(){
    s = (s * 1664525 + 1013904223) | 0;
    return ((s >>> 0) % 100000) / 100000;
  };
}

const Generators = {
  linearChain: function(p, ctx){
    const r = ctx.rng;
    let z = (p.startZ !== undefined ? p.startZ : -300);
    let lastY = 50;
    const len = Math.max(260, p.len || 260);
    for (let i = 0; i < p.count; i++){
      const gap = Math.min(170, (p.gap || 150) + Math.min(8, p.growth || 0) * i);
      z -= (len/2 + gap + (i===0 ? 0 : len/2));
      let y = 50;
      if (p.heightVar){
        y = lastY + (r() - 0.5) * 2 * Math.min(34, p.heightVar);
        if (y < 50) y = 50;
        if (y > lastY + 38) y = lastY + 38;
        lastY = y;
      }
      const c = i % 2 === 0 ? ctx.pri : tint(ctx.pri, 0.85);
      addBox(0, y, z, len, 100, len, c, { isPlatform: true });
      ctx.endZ = z;
      ctx.endY = y;
    }
  },
  descend: function(p, ctx){
    let z = -300, y = 200;
    for (let i = 0; i < p.count; i++){
      z -= (p.len/2 + p.gap + p.len/2);
      y -= p.drop;
      const c = i % 2 === 0 ? ctx.pri : tint(ctx.pri, 0.85);
      addBox(0, y, z, p.len, 100, p.len, c, { isPlatform: true });
      ctx.endZ = z; ctx.endY = y;
    }
  },
  tower: function(p, ctx){
    const r = ctx.rng;
    let x = 0, z = -300, y = 80;
    const side = Math.min(110, p.side || 110);
    const rise = Math.min(32, p.rise || 30);
    for (let i = 0; i < p.steps; i++){
      const off = (p.jitter ? (r() - 0.5) * 2 * side : (i % 2 ? 1 : -1) * side);
      x += off;
      z -= 165;
      y += rise;
      const c = i === p.steps - 1 ? ctx.acc : ctx.pri;
      const e = i === p.steps - 1 ? { emissive: ctx.acc, emissiveIntensity: 0.25 } : {};
      e.isPlatform = true;
      addBox(x, y, z, 300, 36, 300, c, e);
      ctx.endX = x; ctx.endY = y; ctx.endZ = z;
    }
  },
  spiral: function(p, ctx){
    let y = 80;
    const radius = Math.min(290, p.radius || 280);
    const rise = Math.min(30, p.rise || 28);
    const len = Math.max(280, p.len || 280);
    for (let i = 0; i < p.count; i++){
      const ang = (i / p.count) * Math.PI * 4;
      const x = Math.cos(ang) * radius;
      const z = -500 + Math.sin(ang) * radius - i * 95;
      y += rise;
      const c = i === p.count - 1 ? ctx.acc : (i % 2 ? ctx.pri : tint(ctx.pri, 0.85));
      addBox(x, y, z, len, 36, len, c, { isPlatform: true });
      ctx.endX = x; ctx.endY = y; ctx.endZ = z;
    }
  },
  corridor: function(p, ctx){
    let z = -200;
    for (let i = 0; i < p.count; i++){
      z -= (p.len/2 + p.gap + p.len/2);
      addBox(0, 50, z, p.narrow*2, 100, p.len, ctx.pri, { isPlatform: true });
      addBox(-p.narrow, 50 + p.wallH/2, z, p.wallW, p.wallH, p.len, tint(ctx.pri, 0.7), { mirrorSide: 'left_wall' });
      addBox( p.narrow, 50 + p.wallH/2, z, p.wallW, p.wallH, p.len, tint(ctx.pri, 0.7), { mirrorSide: 'right_wall' });
      ctx.endZ = z;
    }
  },
  islands: function(p, ctx){
    const r = ctx.rng;
    const N = p.count;
    let x = 0, z = -260, y = Math.max(70, p.yMin || 60);
    for (let i = 0; i < N; i++){
      x += (r() - 0.5) * 260;
      if (x < -420) x = -420;
      if (x > 420) x = 420;
      z -= 170 + r() * 60;
      y += (r() - 0.5) * 54;
      if (y < Math.max(70, p.yMin || 60)) y = Math.max(70, p.yMin || 60);
      if (y > Math.min(420, p.yMax || 420)) y = Math.min(420, p.yMax || 420);
      const sz = 280 + r() * 120;
      const c = i === N - 1 ? ctx.acc : ctx.pri;
      addBox(x, y, z, sz, 36, sz, c, { isPlatform: true });
      if (i === N - 1){ ctx.endX = x; ctx.endY = y; ctx.endZ = z; }
    }
  },
  stilts: function(p, ctx){
    const r = ctx.rng;
    const N = p.count;
    let x = 0, z = -260, top = Math.max(80, p.yMin || 80);
    for (let i = 0; i < N; i++){
      x += (r() - 0.5) * 230;
      if (x < -380) x = -380;
      if (x > 380) x = 380;
      z -= 165 + r() * 55;
      top += (r() - 0.5) * 46;
      if (top < Math.max(80, p.yMin || 80)) top = Math.max(80, p.yMin || 80);
      if (top > Math.min(300, p.yMax || 300)) top = Math.min(300, p.yMax || 300);
      const c = i === N - 1 ? ctx.acc : ctx.pri;
      addBox(x, top, z, 300, 36, 300, c, { isPlatform: true });
      addBox(x, top/2 - 15, z, 30, top - 30, 30, tint(ctx.pri, 0.6));
      if (i === N - 1){ ctx.endX = x; ctx.endY = top; ctx.endZ = z; }
    }
  },
  hallway: function(p, ctx){
    addBox(0, 50, -p.len/2 - 200, p.w, 100, p.len, ctx.pri, { isPlatform: true });
    addBox(-p.w/2, 50 + p.h/2, -p.len/2 - 200, 80, p.h, p.len, tint(ctx.pri, 0.7), { mirrorSide: 'left_wall' });
    addBox( p.w/2, 50 + p.h/2, -p.len/2 - 200, 80, p.h, p.len, tint(ctx.pri, 0.7), { mirrorSide: 'right_wall' });
    // posts along corridor for parkour beats
    for (let i = 0; i < (p.posts || 0); i++){
      const t = (i + 1) / (p.posts + 1);
      const z = -200 - t * p.len;
      const side = (i % 2 ? 1 : -1) * Math.max(90, p.w/2 - 170);
      addBox(side, 112, z, 150, 124, 150, ctx.acc, { emissive: ctx.acc, emissiveIntensity: 0.2, isPlatform: true });
    }
    ctx.endZ = -p.len - 200; ctx.endY = 50;
  },
  arena: function(p, ctx){
    const sz = p.r * 2;
    const z = p.startZ;
    addBox(0, 50, z + p.r + 180, 420, 100, 320, tint(ctx.pri, 0.9), { isPlatform: true });
    addBox(0, 50, z, sz, 100, sz, ctx.pri, { isPlatform: true });
    // a few raised pads inside
    for (let i = 0; i < 4; i++){
      const ang = (i / 4) * Math.PI * 2;
      addBox(Math.cos(ang) * p.r * 0.5, 200, z + Math.sin(ang) * p.r * 0.5, 200, 30, 200, tint(ctx.pri, 0.85), { isPlatform: true });
    }
    ctx.endX = 0; ctx.endY = 50; ctx.endZ = z - p.r + 100;
  }
};

function tint(hex, factor){
  const r = Math.min(255, ((hex >> 16) & 0xff) * factor);
  const g = Math.min(255, ((hex >> 8) & 0xff) * factor);
  const b = Math.min(255, (hex & 0xff) * factor);
  return (Math.round(r) << 16) | (Math.round(g) << 8) | Math.round(b);
}

const ROBOT_MODEL_PATH = 'assets/models/';
const ROBOT_FBX_URL = ROBOT_MODEL_PATH + 'base_basic_pbr.fbx';
let robotTemplate = null;
let robotLoadStarted = false;
let levelPath = []; // Global level path tracking

// Player reflections and first-person hands
let playerBody = null;

// VideoTexture for the robot's CRT TV head (shared, reused each level)
let headVideoTex = null;
let headVideoMat = null;   // the MeshBasicMaterial slotted onto the head mesh

function ensureHeadVideoTexture(){
  if (headVideoTex) return;
  headVideoTex = new THREE.VideoTexture(videoEl);
  headVideoTex.colorSpace = THREE.SRGBColorSpace;
  headVideoTex.minFilter = THREE.LinearFilter;
  headVideoTex.magFilter = THREE.LinearFilter;
  headVideoTex.flipY = true;    // Flip texture vertically to render right-side up
  headVideoMat = new THREE.MeshBasicMaterial({
    map: headVideoTex,
    toneMapped: false,
    side: THREE.DoubleSide,   // visible from both sides
    depthWrite: false,
  });
}

function createPlayerBody(){
  if (playerBody) {
    scene.remove(playerBody);
    playerBody = null;
  }
  if (!robotTemplate) return;

  playerBody = new THREE.Group();
  
  const model = robotTemplate.clone(true);
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  
  // Scale to player-height (~80 units tall)
  const s = 80 / Math.max(size.x || 1, size.y || 1, size.z || 1);
  model.scale.setScalar(s);
  model.position.set(-center.x * s, -box.min.y * s, -center.z * s);
  playerBody.add(model);

  // Apply video texture to player body head screen
  ensureHeadVideoTexture();
  const screenH = size.y * s * 0.165 * 0.77;
  const screenW = screenH * 1.3;
  const screenY = size.y * s * 0.835 + 6.9;
  const screenDepth = size.z * s * 0.41 - 3.4;
  const screenPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(screenW, screenH),
    headVideoMat
  );
  screenPlane.position.set(0, screenY, screenDepth);
  screenPlane.rotation.set(0.01, -0.01, 0);
  screenPlane.renderOrder = 5;
  playerBody.add(screenPlane);

  // Set to Layer 1: ONLY visible in mirrors
  playerBody.traverse(function(node){
    node.layers.set(1);
    if (node.isMesh) {
      node.castShadow = true;
      node.receiveShadow = true;
    }
  });

  scene.add(playerBody);
  console.log('[AXIOMORT] Player reflection body created on layer 1.');
}

function loadRobotModel(){
  if (robotLoadStarted) return;
  robotLoadStarted = true;
  function startLoader(FBXLoader){
    const loader = new FBXLoader();
    loader.setResourcePath(ROBOT_MODEL_PATH);

      robotTemplate = fbx;

          o.castShadow = true;
          o.receiveShadow = true;

      // Initialize player body and first-person viewmodel hands
      createPlayerBody();
      
      if (started) placeLevelRobots();
    }, undefined, function(err){
      console.warn('robot fbx failed; using fallback NPC', err);
      robotTemplate = false;
      if (started) placeLevelRobots();
    });
  }
  startLoader(FBXLoader);
}


function makeRobotNPC(x, y, z, role, acc){
  const g = new THREE.Group();
  g.position.set(x, y + 50, z);
  g.userData.role = role;
  g.userData.baseY = g.position.y;

  if (robotTemplate){
    const model = robotTemplate.clone(true);
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    
    // Scale to player-height (~80 units tall)
    const s = 80 / Math.max(size.x || 1, size.y || 1, size.z || 1);
    model.scale.setScalar(s);
    model.userData.defaultScale = s;
    model.position.set(-center.x * s, -box.min.y * s, -center.z * s);
    g.add(model);

    // === Apply video texture to CRT TV head ===
    ensureHeadVideoTexture();

    const screenH = size.y * s * 0.165 * 0.77; // scaled down to fit CRT bezel
    const screenW = screenH * 1.3;   // CRT TV ratio (4:3 aspect ratio fits the model bezel perfectly)
    const screenY = size.y * s * 0.835 + 6.9; // Y-aligned to the center of CRT screen
    const screenDepth = size.z * s * 0.41 - 3.4;  // Z-aligned to sit flush inside the TV bezel
    const screenPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(screenW, screenH),
      headVideoMat
    );
    screenPlane.position.set(0, screenY, screenDepth);
    screenPlane.rotation.set(0.01, -0.01, 0); // Yaw/Pitch aligned to the TV head tilt
    screenPlane.renderOrder = 5;
    g.add(screenPlane);
    g.userData.videoScreen = screenPlane;
    console.log('[AXIOMORT] Screen visor attached to TV head.');
  } else {
    // Fallback blocky robot mesh representation
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(120, 180, 70),
      new THREE.MeshStandardMaterial({ color: 0x1b332c, metalness: 0.2, roughness: 0.55 })
    );
    body.position.y = 90;
    g.add(body);

    ensureHeadVideoTexture();
    const face = new THREE.Mesh(
      new THREE.PlaneGeometry(150, 86),
      headVideoMat
    );
    face.position.set(0, 215, 46);
    g.add(face);
    g.userData.face = face;

    // Add blocky arms ONLY for the fallback robot representation
    const arm = new THREE.Group();
    const upper = new THREE.Mesh(
      new THREE.BoxGeometry(20, 100, 20),
      new THREE.MeshBasicMaterial({ color: acc || RIFT_TEAL, toneMapped: false })
    );
    upper.position.y = -50;
    arm.add(upper);
    arm.position.set(86, 190, 0);
    g.add(arm);
    g.userData.waveArm = arm;

    const leftArm = new THREE.Group();
    const leftUpper = new THREE.Mesh(
      new THREE.BoxGeometry(20, 100, 20),
      new THREE.MeshBasicMaterial({ color: acc || RIFT_TEAL, toneMapped: false })
    );
    leftUpper.position.y = -50;
    leftArm.add(leftUpper);
    leftArm.position.set(-86, 190, 0);
    g.add(leftArm);
    g.userData.leftArm = leftArm;
  }

  scene.add(g);
  npcGroups.push(g);
  return g;
}

function placeLevelRobots(){
  for (let i = npcGroups.length - 1; i >= 0; i--) scene.remove(npcGroups[i]);

function animateRobots(t, dt){
  if (dt === undefined) dt = 0.016; // default fallback
  
  for (let i = 0; i < npcGroups.length; i++){
    const g = npcGroups[i];
    
    // Smooth mechanical hover bobbing
    g.position.y = g.userData.baseY + Math.sin(t * 2.5 + i) * 6;
    
    // Smooth Look-At Player tracking
    if (player && player.pos) {
      const dx = player.pos.x - g.position.x;
      const dz = player.pos.z - g.position.z;
      const targetAngle = Math.atan2(dx, dz);
      
      let diff = targetAngle - g.rotation.y;
      diff = Math.atan2(Math.sin(diff), Math.cos(diff));
      g.rotation.y += diff * Math.min(1, dt * 4.5);
      
      // Subtle mechanical breathing tilts
      g.rotation.z = Math.sin(t * 1.5 + i) * 0.03;
      g.rotation.x = Math.sin(t * 1.0 + i) * 0.02;
    }
    
    // Fallback blocky robot waving arms (if present)
    if (g.userData.waveArm) {
      g.userData.waveArm.rotation.z = -0.65 + Math.sin(t * 5.2) * 0.55;
    }
    if (g.userData.leftArm) {
      g.userData.leftArm.rotation.z = 0.65 - Math.sin(t * 5.2) * 0.55;
    }
    if (g.userData.face && g.userData.role !== 'end') {
      g.userData.face.material.opacity = 0.5 + Math.sin(t * 3.5 + i) * 0.18;
    }
    
    // Positional panning follows the actual robot position
    if (g.userData.role === 'end' && audioCtx) {
      updatePannerPos(g.position);
    }
  }
}

// ========== VIDEO BILLBOARD GOAL ==========
// The level-end goal is a giant 16:9 music video billboard. Player bhops/jumps INTO it to advance.
// Video is loaded into videoEl and streamed as a THREE.VideoTexture onto the robot's CRT TV head mesh.
// Audio plays as 3D positional audio (Web Audio PannerNode) originating from the end robot's position.
// A small teal rift vein on the ground leads up to the billboard so the rift motif is preserved.
let goalMesh = null;             // billboard plane mesh (used for trigger detection)
let goalGroup = null;            // root group (cleared on level change)
let goalPos = new THREE.Vector3();
let goalNormal = new THREE.Vector3(0, 0, 1);   // plane normal — billboard faces +Z
let goalPlayerLastSide = 0;      // signed side, for crossing detection
const RIFT_TEAL = 0x2affd6;
const BILLBOARD_W = 2300;        // world units
const BILLBOARD_H = 1294;        // 16:9
const BILLBOARD_HALF = { w: BILLBOARD_W / 2, h: BILLBOARD_H / 2 };

// Video state (videoEl is created in the audio section above)

function placeGoal(x, y, z){
  const L = LEVELS[currentLevel];
  // surface = top of the goal platform (box centered at y with h=100 → top at y+50)
  const surfaceY = y + 51;
  const midY = surfaceY + BILLBOARD_H / 2 + 60;   // raise so bottom edge floats above ground

  // billboard faces toward the spawn (player approaches from +Z toward -Z).
  // The billboard sits at z, normal pointing +Z. PlaneGeometry default normal is +Z so no rotate.
  goalPos.set(x, midY, z);
  goalNormal.set(0, 0, 1);

  const g = new THREE.Group();
  g.position.set(x, 0, z);

  // === Billboard plane with AAA Rift shader ===
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uPriColor: { value: new THREE.Color(L.pri) },
      uAccColor: { value: new THREE.Color(L.acc) },
      uTime: { value: 0 }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 uPriColor;
      uniform vec3 uAccColor;
      uniform float uTime;
      varying vec2 vUv;

      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
      }
      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        vec2 u = f*f*(3.0-2.0*f);
        return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                   mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
      }
      float fbm(vec2 p) {
        float v = 0.0;
        float a = 0.5;
        for (int i = 0; i < 4; i++) {
          v += a * noise(p);
          p *= 2.0;
          a *= 0.5;
        }
        return v;
      }

      void main() {
        vec2 uv = vUv - 0.5;
        float r = length(uv);
        float angle = atan(uv.y, uv.x);
        
        float swirl = fbm(uv * 4.0 + vec2(0.0, uTime * 0.15)) * 6.28;
        float distortedAngle = angle + swirl;
        
        float aspect = 16.0 / 9.0;
        vec2 ellUv = uv * vec2(1.0, aspect);
        float d = length(ellUv);
        
        float edgeNoise = fbm(vec2(distortedAngle * 2.5, r * 5.0 - uTime * 0.4));
        float riftRadius = 0.24 + edgeNoise * 0.08;
        
        float edgeWidth = 0.06;
        float glow = exp(-abs(d - riftRadius) * 12.0);
        
        float energyEdge = smoothstep(riftRadius + edgeWidth, riftRadius, d) * 
                           smoothstep(riftRadius - edgeWidth, riftRadius, d);
                           
        float interior = smoothstep(riftRadius, riftRadius - 0.015, d);
        
        vec3 edgeColor = mix(uAccColor, vec3(1.0, 1.0, 1.0), energyEdge * 0.4);
        vec3 interiorColor = mix(uPriColor * 0.08, vec3(0.0), d / riftRadius);
        
        if (interior > 0.0) {
          vec2 starUV = uv * 38.0;
          float star = hash(floor(starUV));
          if (star > 0.93) {
            float twinkle = 0.4 + 0.6 * sin(uTime * 4.0 + star * 8.0);
            interiorColor += vec3(twinkle * smoothstep(0.12, 0.0, length(fract(starUV) - 0.5)));
          }
        }
        
        vec3 col = mix(vec3(0.0), interiorColor, interior);
        col += edgeColor * (energyEdge * 2.0 + glow * 1.0);
        
        float alpha = smoothstep(0.5, 0.3, r);
        alpha = max(alpha * (interior + energyEdge * 2.5 + glow * 1.5), 0.0);
        
        gl_FragColor = vec4(col, clamp(alpha, 0.0, 1.0));
      }
    `,
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide
  });

  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(BILLBOARD_W, BILLBOARD_H), mat);
  mesh.position.set(0, midY, 8);
  mesh.renderOrder = 10;
  g.add(mesh);
  goalMesh = mesh;
  g.userData.mesh = mesh;
  g.userData.mat = mat;

  // === Rift vein on ground, matching level accent ===
  const veinGroup = new THREE.Group();
  veinGroup.position.set(0, surfaceY + 0.6, 0);
  const veinLen = 460;
  const vein = new THREE.Mesh(
    new THREE.BoxGeometry(36, 4, veinLen),
    new THREE.MeshBasicMaterial({ color: L.acc })
  );
  vein.position.z = veinLen / 2 + 30;  // extend from billboard base toward +Z (player approach)
  veinGroup.add(vein);
  // branches
  function veinBranch(len, w, rot, off){
    const b = new THREE.Mesh(
      new THREE.BoxGeometry(w, 4, len),
      new THREE.MeshBasicMaterial({ color: L.acc, transparent: true, opacity: 0.85 })
    );
    b.position.set(off[0], 0, off[1]);
    b.rotation.y = rot;
    veinGroup.add(b);
  }
  veinBranch(160, 18,  0.7,  [-40,  120]);
  veinBranch(140, 14, -0.6,  [ 50,  220]);
  veinBranch(120, 12,  0.8,  [-30,  340]);
  g.add(veinGroup);
  g.userData.vein = vein;

  scene.add(g);
  goalGroup = g;
  goalPlayerLastSide = 0;
}

// === Video loading: load MP4 into videoEl, which feeds the WebGL VideoTexture on the robot head ===
function loadBillboardMedia(track){
  // Reset
  usingLocalVideo = false;
  billboardVideoReady = false;
  safeVideoPause();
  videoEl.onloadeddata = null;
  videoEl.oncanplay = null;
  videoEl.onplaying = null;
  videoEl.onerror = null;

  if (track.videoURL){
    videoEl.onplaying = videoEl.oncanplay = videoEl.onloadeddata = function(){
      usingLocalVideo = true;
      billboardVideoReady = true;
      if (headVideoTex) headVideoTex.needsUpdate = true;
      playBillboardVideo();
    };
    videoEl.onerror = function(){ fallbackToLocalPlaceholder(); };
    videoEl.src = track.videoURL;
    videoEl.load();
  } else {
    fallbackToLocalPlaceholder();
  }
}

function fallbackToLocalPlaceholder(){
  if (usingLocalVideo) return;
  billboardVideoReady = false;
  safeVideoPause();
  videoEl.onplaying = null;
  videoEl.oncanplay = null;
  videoEl.onloadeddata = null;
  videoEl.onerror = null;
  videoEl.removeAttribute('src');
  videoEl.load();
}

let _videoPlayPromise = null;

function safeVideoPause(){
  if (_videoPlayPromise){
    _videoPlayPromise.then(function(){
      videoEl.pause();
    }).catch(function(){});
    _videoPlayPromise = null;
  } else {
    try { videoEl.pause(); } catch(e){}
  }
}

function playBillboardVideo(){
  if (!videoEl.src) return;
  if (_videoPlayPromise) return;  // play already in flight — don't stack another
  if (!videoEl.paused && videoEl.readyState >= 2) return;
  const now = performance.now();
  if (now - lastVideoPlayAttempt < 800) return;
  lastVideoPlayAttempt = now;
  videoEl.muted = false;
  _videoPlayPromise = videoEl.play();
  if (_videoPlayPromise){
    _videoPlayPromise.then(function(){
      _videoPlayPromise = null;
    }).catch(function(err){
      _videoPlayPromise = null;
      if (err && err.name !== 'AbortError'){
        console.warn('video play blocked:', err.message || err);
      }
    });
  } else {
    _videoPlayPromise = null;
  }
}

function loadLevel(idx){
  levelLoaded = true;
  currentLevel = ((idx % LEVELS.length) + LEVELS.length) % LEVELS.length;
  const L = LEVELS[currentLevel];
  const T = TRACKS[currentLevel];

  clearLevel();
  scene.background = new THREE.Color(tint(L.sky, 2.1));
  scene.fog = new THREE.Fog(tint(L.fog[0], 1.8), Math.max(850, L.fog[1]), L.fog[2] * 1.18);

  // Update skybox uniforms based on this level's custom palette
  if (skyMat) {
    skyMat.uniforms.uBgColor.value.setHex(L.sky);
    skyMat.uniforms.uPriColor.value.setHex(L.pri);
    skyMat.uniforms.uAccColor.value.setHex(L.acc);
    skyMat.uniforms.uSeed.value = currentLevel * 1.73;
  }

  // Single hero accent light per level — color pulled from the cover.
  heroLight.color.setHex(L.acc);
  heroLight.intensity = 2.25;
  heroLight.position.set(0, 920, -1500);
  // Tint ambient + sun toward the cover palette so each level reads in its own hue.
  ambient.color.setHex(tint(L.pri, 1.25));
  hemi.color.setHex(0xcfe8ff);
  hemi.groundColor.setHex(tint(L.pri, 0.7));
  sun.color.setHex(0xfff0c8);
  skyFill.color.setHex(tint(L.acc, 0.85));
  renderer.toneMappingExposure = 1.75;

  // spawn platform
  addBox(0, 50, 0, 700, 100, 700, tint(L.pri, 0.9));

  // build via generators
  const ctx = { pri: L.pri, acc: L.acc, rng: rand(idx * 9173 + 17), endX: 0, endY: 50, endZ: -2500 };
  for (let i = 0; i < L.build.length; i++){
    const step = L.build[i];
    const fn = Generators[step[0]];
    if (fn) fn(step[1] || {}, ctx);
  }

  // build a small landing platform at the goal so the rift sits on something
  const gx = ctx.endX || 0;
  const gy = ctx.endY || 50;
  const gz = (ctx.endZ || -2500) - 600;
  addBox(gx, gy, gz, 1000, 100, 1000, tint(L.pri, 0.7));
  placeGoal(gx, gy, gz);
  riftLight.color.setHex(L.acc);
  riftLight.position.set(gx, gy + 180, gz);
  placeLevelRobots();

  // spawn player
  player.pos.copy(spawn.pos);
  player.vel.set(0, 0, 0);
  player.yaw = spawn.yaw;
  player.pitch = 0;
  player.crouching = false;
  player.eyeOffset = cfg.eyeheight;
  player._jumpLatch = false;

  // Set dynamic void Y threshold based on the lowest platform in this level
  let minY = 1e9;
  for (let i = 0; i < boxes.length; i++) {
    if (boxes[i].min.y < minY) minY = boxes[i].min.y;
  }
  voidY = Math.min(-100, minY - 80);
  window.voidY = voidY;

  // music / video — load the MP4 for this level (audio plays 3D from robot's position)
  safeVideoPause();
  videoEl.src = T.videoURL;
  videoEl.currentTime = 0;
  billboardVideoReady = false;
  usingLocalVideo = false;
  loadBillboardMedia(T);
  if (pointerLocked) playBillboardVideo();

  // UI
  document.getElementById('lvlNum').textContent = String(currentLevel + 1).padStart(2,'0');
  showBanner(L, T);
}

    startEl.style.display = 'none';
    pauseEl.classList.remove('show');
    // First-time start fallback (in case it wasn't triggered by click)
    if (!started){
      beginGameplay();
    }
    // Ensure audio and video are playing
    resumeMediaFromGesture();
  } else {
    // Show pause menu if game has started
    if (started){
      pauseEl.classList.add('show');
      safeVideoPause();
    } else {
      startEl.style.display = 'grid';
    }
  }
});

document.addEventListener('pointerlockerror', function(err){
  console.warn('[AXIOMORT] Pointer lock error event fired:', err);
});


document.addEventListener('mousemove', function(e){
  if (!pointerLocked) return;
  let mx = e.movementX;
  let my = e.movementY;
  if (Math.abs(mx) > 300) mx = Math.sign(mx) * 300;
  if (Math.abs(my) > 300) my = Math.sign(my) * 300;
  player.yaw   -= mx * opt.sens;
  player.pitch -= my * opt.sens;
  const lim = Math.PI/2 - 0.001;
  if (player.pitch >  lim) player.pitch =  lim;
  if (player.pitch < -lim) player.pitch = -lim;
});

// ========== MOVEMENT MATH ==========
function applyFriction(dt){
  const speed = player.vel.length();
  if (speed < 0.0001) return;
  let drop = 0;
  if (player.grounded){
    const control = speed < cfg.stopspeed ? cfg.stopspeed : speed;
    drop = control * cfg.friction * dt;
  }
  let ns = speed - drop; if (ns < 0) ns = 0;
  player.vel.multiplyScalar(ns / speed);
}
function accelerate(wishdir, wishspeed, accel, dt){
  const cs = player.vel.dot(wishdir);
  const add = wishspeed - cs;
  if (add <= 0) return;
  let a = accel * dt * wishspeed;
  if (a > add) a = add;
  player.vel.x += a * wishdir.x;
  player.vel.z += a * wishdir.z;
}
const mobileMove = { f: 0, s: 0 };   // analog joystick input (mobile)
function getWishDir(){
  let f = 0, s = 0;
  if (keys['KeyW']) f += 1;
  if (keys['KeyS']) f -= 1;
  if (keys['KeyD']) s += 1;
  if (keys['KeyA']) s -= 1;
  f += mobileMove.f; s += mobileMove.s;
  if (Math.abs(f) < 0.02 && Math.abs(s) < 0.02) return null;
  const cy = Math.cos(player.yaw), sy = Math.sin(player.yaw);
  const dx = -sy*f + cy*s;
  const dz = -cy*f - sy*s;
  const len = Math.hypot(dx, dz);
  if (len < 1e-6) return null;
  return new THREE.Vector3(dx/len, 0, dz/len);
}
function tryJump(){
  if (!player.grounded) return;
  player.vel.y = cfg.jumpvel;
  player.grounded = false;
}
function step(dt){
  const jumpHeld = !!keys['Space'];
  const crouchHeld = !!keys['ControlLeft'] || !!keys['ControlRight'];
  const sprintHeld = !!keys['ShiftLeft'] || !!keys['ShiftRight'];
  player.crouching = crouchHeld;
  if (jumpHeld && (player.autohop || !player._jumpLatch)) tryJump();
  player._jumpLatch = jumpHeld;
  const wms = player.crouching ? cfg.crouchspeed : (sprintHeld ? cfg.sprintspeed : cfg.maxspeed);
  applyFriction(dt);
  const wd = getWishDir();
  if (wd){
    if (player.grounded) accelerate(wd, wms, cfg.accelerate, dt);
    else accelerate(wd, Math.min(wms, cfg.airWishCap + (sprintHeld ? 8 : 0)), cfg.airaccelerate, dt);
  }
  if (!player.grounded) player.vel.y -= cfg.gravity * dt;
  moveAndCollide(dt);
}
function moveAndCollide(dt){
  player.grounded = false;
  player.pos.x += player.vel.x * dt; resolveAxis('x');
  player.pos.z += player.vel.z * dt; resolveAxis('z');
  player.pos.y += player.vel.y * dt; resolveAxis('y');
  if (player.pos.y < voidY) resetPlayer();
  checkGoal();
}
const _pmin = new THREE.Vector3(), _pmax = new THREE.Vector3();
function currentPlayerHeight(){
  return player.crouching ? cfg.crouchHeight : cfg.playerHeight;
}
function resolveAxis(axis){
  const hw = cfg.playerHalfWidth, ph = currentPlayerHeight();
  for (let i = 0; i < boxes.length; i++){
    const b = boxes[i];
    _pmin.set(player.pos.x - hw, player.pos.y, player.pos.z - hw);
    _pmax.set(player.pos.x + hw, player.pos.y + ph, player.pos.z + hw);
    if (_pmin.x >= b.max.x || _pmax.x <= b.min.x) continue;
    if (_pmin.y >= b.max.y || _pmax.y <= b.min.y) continue;
    if (_pmin.z >= b.max.z || _pmax.z <= b.min.z) continue;
    
    if (axis === 'x'){
      const bcx = (b.min.x + b.max.x) / 2;
      if (player.pos.x > bcx) {
        player.pos.x = b.max.x + hw + 0.001;
      } else {
        player.pos.x = b.min.x - hw - 0.001;
      }
      player.vel.x = 0;
    } else if (axis === 'z'){
      const bcz = (b.min.z + b.max.z) / 2;
      if (player.pos.z > bcz) {
        player.pos.z = b.max.z + hw + 0.001;
      } else {
        player.pos.z = b.min.z - hw - 0.001;
      }
      player.vel.z = 0;
    } else {
      const bcy = (b.min.y + b.max.y) / 2;
      if ((player.pos.y + ph/2) > bcy) {
        player.pos.y = b.max.y + 0.001;
        player.vel.y = 0;
        player.grounded = true;
      } else {
        player.pos.y = b.min.y - ph - 0.001;
        player.vel.y = 0;
      }
    }
  }
}
function resetPlayer(){
  const f = document.getElementById('fade');
  if (f) {
    f.style.transition = 'none';
    f.style.opacity = '0.9';
    void f.offsetHeight;
    f.style.transition = 'opacity 0.35s ease';
    f.style.opacity = '0';
  }
  player.pos.copy(spawn.pos);
  player.vel.set(0,0,0);
  player.yaw = spawn.yaw; player.pitch = 0;
  player.crouching = false;
  player.eyeOffset = cfg.eyeheight;
  player._jumpLatch = false;
}
function checkGoal(){
  if (!goalMesh || singleCleared) return;
  const dx = player.pos.x - goalPos.x;
  const dy = (player.pos.y + 36) - goalPos.y;
  const dz = player.pos.z - goalPos.z;
  const side = dx * goalNormal.x + dy * goalNormal.y + dz * goalNormal.z;
  const insideScreen = Math.abs(dx) <= BILLBOARD_HALF.w + 90 && Math.abs(dy) <= BILLBOARD_HALF.h + 90;
  const crossedPlane = goalPlayerLastSide > 0 && side <= 0;
  const grazedPlane = Math.abs(side) < 80 && insideScreen;
  if (insideScreen && (crossedPlane || grazedPlane)){
    try { parent.postMessage({ axDim: 'complete' }, '*'); } catch (e) {}
    goalPlayerLastSide = side;
    if (singleMode){
      // One song, one level — clear it and hold. The tower claims the disc.
      singleCleared = true;
      showCleared();
      return;
    }
    const next = currentLevel + 1;
    if (next >= LEVELS.length){
      // win — wrap for now
      transitionToLevel(0);
    } else {
      transitionToLevel(next);
    }
  }
  goalPlayerLastSide = side;
}

function showCleared(){
  const T = TRACKS[currentLevel];
  let el = document.getElementById('axCleared');
  if (!el){
    el = document.createElement('div');
    el.id = 'axCleared';
    el.style.cssText = 'position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;'+
      'align-items:center;justify-content:center;text-align:center;pointer-events:none;'+
      'background:radial-gradient(ellipse at center,rgba(8,10,22,.55),rgba(4,5,12,.9));'+
      "font-family:'Space Grotesk','Jost',sans-serif;animation:axpop .5s cubic-bezier(.16,1,.3,1);";
    document.body.appendChild(el);
    const st = document.createElement('style');
    st.textContent = '@keyframes axpop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}';
    document.head.appendChild(st);
  }
  el.innerHTML =
    '<div style="font:700 13px/1 \'Space Grotesk\',sans-serif;letter-spacing:4px;color:#7CFFB2;'+
      'text-transform:uppercase;margin-bottom:18px;text-shadow:0 0 20px rgba(124,255,178,.6)">▸ Level Cleared</div>'+
    '<div style="font:800 clamp(34px,7vw,72px)/1 \'Space Grotesk\',sans-serif;color:#fff;'+
      'letter-spacing:-1px;text-shadow:0 4px 40px rgba(0,0,0,.6)">'+ T.title +'</div>'+
    '<div style="font:600 15px/1.5 \'Space Grotesk\',sans-serif;color:#cfd7ee;margin-top:22px;max-width:420px;padding:0 20px">'+
      'Disc unlocked. Returning the signal to the tower...</div>';
  el.style.display = 'flex';
}

// ========== PAUSE MENU WIRING ==========
function syncToggles(){
  document.getElementById('tAuto').classList.toggle('on', player.autohop);
  document.getElementById('tEq').classList.toggle('on', opt.eq);
}
function bind(id, vId, fmt, on){
  const el = document.getElementById(id);
  const lab = document.getElementById(vId);
  el.addEventListener('input', function(){
    const v = parseFloat(el.value); on(v); lab.textContent = fmt(v); applyAudioSettings();
  });
}
bind('volMaster','vMaster', v => Math.round(v*100), v => { opt.master = v; });
bind('volMusic', 'vMusic',  v => Math.round(v*100), v => { opt.music  = v; });
bind('optSens',  'vSens',   v => (v*1000).toFixed(1), v => { opt.sens = v; });
bind('optFov',   'vFov',    v => Math.round(v),       v => { opt.fov  = v; camera.fov = v; camera.updateProjectionMatrix(); });

document.getElementById('tAuto').addEventListener('click', function(){
  player.autohop = !player.autohop; syncToggles();
});
document.getElementById('tEq').addEventListener('click', function(){
  opt.eq = !opt.eq; syncToggles(); applyAudioSettings();
});
document.getElementById('bResume').addEventListener('click', function(){ canvas.requestPointerLock(); });
document.getElementById('bRestart').addEventListener('click', function(){ canvas.requestPointerLock(); setTimeout(()=>loadLevel(currentLevel), 30); });

// ========== RENDER LOOP ==========
const speedVal = document.getElementById('speedVal');
const groundEl = document.getElementById('ground');
let last = performance.now();
let started = false;

function frame(now){
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.05) dt = 0.05;

  const movementActive = pointerLocked || (autoStartMode && started && !pauseEl.classList.contains('show'));
  if (movementActive){
    const fixed = 1/120;
    let rem = dt;
    while (rem > 0){
      const s = Math.min(rem, fixed); step(s); rem -= s;
    }
  }
  
  if (window.AXEngine && window.AXEngine.ecs) {
      window.AXEngine.physicsSys.update(dt, window.AXEngine.ecs);
      window.AXEngine.syncSys.update(window.AXEngine.ecs);
      if (window.AXEngine.ProceduralFactory) {
          window.AXEngine.ProceduralFactory.updateTime(dt);
      }
  }
  if (started && videoEl.src && videoEl.paused) playBillboardVideo();

  const targetEye = player.crouching ? cfg.crouchEyeHeight : cfg.eyeheight;
  player.eyeOffset += (targetEye - player.eyeOffset) * Math.min(1, dt * 14);
  camera.position.set(player.pos.x, player.pos.y + player.eyeOffset, player.pos.z);
  const cy = Math.cos(player.yaw), sy = Math.sin(player.yaw);
  const cp = Math.cos(player.pitch), sp = Math.sin(player.pitch);
  camera.lookAt(camera.position.x + (-sy*cp), camera.position.y + sp, camera.position.z + (-cy*cp));

  // Sync reflection player body position and rotation (only visible in mirrors)
  if (playerBody) {
    playerBody.position.copy(player.pos);
    playerBody.rotation.y = player.yaw;
  }

  // Animate first-person viewmodel sway (breathing and walk cycle bobbing)
  if (playerBody) {
    // We only need to sway the reflection body if desired, or keep it synced to camera position
  }

  updateListenerPos();

  // Keep skybox centered on camera and update time uniforms
  if (skyDome) {
    skyDome.position.copy(camera.position);
  }
  if (skyMat) {
    skyMat.uniforms.uTime.value = now * 0.001;
  }

  // Update HUD Navigation Direction and Distance to Goal Billboard
  if (goalPos) {
    const dx = goalPos.x - player.pos.x;
    const dz = goalPos.z - player.pos.z;
    const dist = Math.hypot(dx, dz);
    const forwardX = -sy;
    const forwardZ = -cy;
    const forwardAngle = Math.atan2(forwardX, forwardZ);
    const goalAngle = Math.atan2(dx, dz);
    let diff = forwardAngle - goalAngle;
    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
    const navArrow = document.getElementById('navArrow');
    const navDist = document.getElementById('navDist');
    if (navArrow && navDist) {
      navArrow.style.transform = `rotate(${diff}rad)`;
      navDist.textContent = Math.round(dist / 10) + 'm';
    }
  }

  // Force VideoTexture to upload the current video frame to GPU each frame
  if (headVideoTex && !videoEl.paused && videoEl.readyState >= 2){
    headVideoTex.needsUpdate = true;
  }


  if (goalMesh && goalMesh.material && goalMesh.material.uniforms){
    goalMesh.material.uniforms.uTime.value = performance.now() * 0.001;
  }
  animateRobots(performance.now() * 0.001, dt);

  speedVal.textContent = Math.round(Math.hypot(player.vel.x, player.vel.z));
  groundEl.textContent = player.grounded ? 'GROUND' : 'AIR';

  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}

addEventListener('resize', function(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

// boot
function start(){
  if (autoStartMode) {
    startEl.style.display = 'none';
    beginGameplay();
    playBillboardVideo();
  } else {
    startEl.style.display = 'grid';
  }
}

// ===== MOBILE TOUCH CONTROLS (joystick move, drag look, hold-to-jump) =====
if (AX_MOBILE) {
  const mk = (css, txt) => { const d=document.createElement('div'); d.style.cssText=css; if(txt)d.textContent=txt; document.body.appendChild(d); return d; };
  const joy = mk('position:fixed;left:24px;bottom:30px;width:120px;height:120px;border-radius:50%;border:1px solid rgba(124,255,178,.35);background:rgba(8,16,12,.28);z-index:60;touch-action:none;');
  const knob = document.createElement('div'); knob.style.cssText='position:absolute;left:50%;top:50%;width:52px;height:52px;margin:-26px;border-radius:50%;background:rgba(124,255,178,.42);'; joy.appendChild(knob);
  const jumpBtn = mk('position:fixed;right:28px;bottom:42px;width:96px;height:96px;border-radius:50%;border:1px solid rgba(124,255,178,.5);background:rgba(124,255,178,.16);color:#7CFFB2;font:700 15px/96px "Space Grotesk",sans-serif;text-align:center;z-index:60;touch-action:none;user-select:none;', 'JUMP');

  let joyId=null, jcx=0, jcy=0;
  joy.addEventListener('touchstart', e=>{ e.preventDefault(); const t=e.changedTouches[0]; joyId=t.identifier; const r=joy.getBoundingClientRect(); jcx=r.left+r.width/2; jcy=r.top+r.height/2; }, {passive:false});
  addEventListener('touchmove', e=>{ for(const t of e.changedTouches){ if(t.identifier===joyId){ let dx=t.clientX-jcx, dy=t.clientY-jcy; const m=Math.hypot(dx,dy)||1, cl=Math.min(m,55)/55; dx=dx/m*cl; dy=dy/m*cl; knob.style.transform=`translate(${dx*44}px,${dy*44}px)`; mobileMove.f=-dy; mobileMove.s=dx; } } }, {passive:false});
  const joyEnd = e=>{ for(const t of e.changedTouches){ if(t.identifier===joyId){ joyId=null; mobileMove.f=mobileMove.s=0; knob.style.transform=''; } } };
  addEventListener('touchend', joyEnd); addEventListener('touchcancel', joyEnd);

  jumpBtn.addEventListener('touchstart', e=>{ e.preventDefault(); keys['Space']=true; }, {passive:false});
  const jumpUp = e=>{ e.preventDefault(); keys['Space']=false; };
  jumpBtn.addEventListener('touchend', jumpUp, {passive:false}); jumpBtn.addEventListener('touchcancel', jumpUp, {passive:false});

  // drag anywhere on the canvas (outside the pads) to look around
  let lookId=null, lpx=0, lpy=0;
  canvas.addEventListener('touchstart', e=>{ const t=e.changedTouches[0]; lookId=t.identifier; lpx=t.clientX; lpy=t.clientY; }, {passive:true});
  addEventListener('touchmove', e=>{ for(const t of e.changedTouches){ if(t.identifier===lookId){ player.yaw -= (t.clientX-lpx)*0.005; player.pitch -= (t.clientY-lpy)*0.005; const lim=Math.PI/2-0.05; if(player.pitch>lim)player.pitch=lim; if(player.pitch<-lim)player.pitch=-lim; lpx=t.clientX; lpy=t.clientY; } } }, {passive:true});
  const lookEnd = e=>{ for(const t of e.changedTouches){ if(t.identifier===lookId) lookId=null; } };
  addEventListener('touchend', lookEnd); addEventListener('touchcancel', lookEnd);
}

camera.fov = opt.fov;
camera.updateProjectionMatrix();
syncToggles();
start();
requestAnimationFrame(frame);
})();
</script>
